<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="50%" stop-color="#1A6DFF"/>
      <stop offset="100%" stop-color="#00C9A7"/>
    </linearGradient>
    <linearGradient id="card-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="chart-line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <radialGradient id="glass" cx="30%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="chart-glow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <rect width="512" height="512" rx="115" fill="url(#glass)"/>

  <g transform="translate(256, 275)">
    <rect x="-130" y="-80" width="260" height="160" rx="16" fill="url(#card-glow)" filter="url(#card-shadow)"/>

    <rect x="-100" y="-55" width="32" height="24" rx="4" fill="url(#chip)"/>

    <line x1="-100" y1="-15" x2="100" y2="-15" stroke="#D0D5DD" stroke-width="2" stroke-linecap="round"/>
    <line x1="-100" y1="5" x2="60" y2="5" stroke="#D0D5DD" stroke-width="2" stroke-linecap="round"/>
    <line x1="-100" y1="25" x2="80" y2="25" stroke="#D0D5DD" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g filter="url(#chart-glow)">
    <path d="M 180 310 C 200 310, 210 270, 230 260 C 250 250, 260 220, 280 200 C 300 180, 310 150, 340 140"
          fill="none" stroke="url(#chart-line)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="340" cy="140" r="5" fill="#ffffff"/>
  </g>
</svg>
